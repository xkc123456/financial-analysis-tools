 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,initial-scale=1.0">
 <title>财务雷达图 - 公司对比</title>
 <style>
   * { margin:0; padding:0; box-sizing:border-box; }
   body { font-family:'Segoe UI',sans-serif; background:#0f172a; color:#e2e8f0; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
   .container { max-width:900px; width:100%; }
   h1 { font-size:22px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:10px; }
   h1 span { font-size:12px; font-weight:400; background:#1e293b; padding:2px 10px; border-radius:8px; color:#64748b; }
   .subtitle { color:#64748b; font-size:13px; margin-bottom:20px; }
   .main { display:grid; grid-template-columns:1fr 320px; gap:20px; }
   @media (max-width:700px) { .main { grid-template-columns:1fr; } }
   .canvas-wrap { background:#0f172a; border-radius:12px; border:1px solid #1e293b; padding:10px; }
   .canvas-wrap canvas { display:block; width:100%; aspect-ratio:1/1; }
   .panel { display:flex; flex-direction:column; gap:12px; }
   .card { background:#0f172a; border-radius:12px; border:1px solid #1e293b; padding:14px; }
   .card-title { font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
   .toggle-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; transition:all .15s; margin-bottom:4px; }
   .toggle-item:hover { background:#1e293b; }
   .toggle-item .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
   .toggle-item .name { font-size:13px; flex:1; }
   .toggle-item .score { font-size:12px; color:#64748b; }
   .legend-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12px; color:#94a3b8; }
   .legend-row .line { width:20px; height:3px; border-radius:2px; flex-shrink:0; }
   .legend-row .lv { margin-left:auto; font-weight:600; color:#e2e8f0; }
   .footer { text-align:center; margin-top:16px; font-size:11px; color:#334155; }
   .btn { padding:6px 14px; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; background:#1e293b; color:#94a3b8; transition:all .15s; }
   .btn:hover { background:#334155; color:#e2e8f0; }
   .btn-group { display:flex; gap:6px; }
   .score-note { font-size:11px; color:#475569; margin-top:6px; text-align:center; }
 </style>
 </head>
 <body>
 <div class="container">
   <h1>📡 财务雷达图 <span>Company Radar</span></h1>
   <p class="subtitle">多维度财务指标对比 · 点击公司名称切换显示</p>
   <div class="main">
     <div class="canvas-wrap"><canvas id="radar"></canvas></div>
     <div class="panel">
       <div class="card">
         <div class="card-title">📊 公司选择</div>
         <div id="toggles"></div>
         <div style="margin-top:8px;"><button class="btn" onclick="resetAll()">🔄 全选</button></div>
       </div>
       <div class="card">
         <div class="card-title">📈 综合评分</div>
         <div id="scoreBoard"></div>
         <div class="score-note">基于六项指标标准化后加权计算</div>
       </div>
       <div class="card">
         <div class="card-title">🎯 指标说明</div>
         <div id="legend"></div>
       </div>
     </div>
   </div>
   <div class="footer">财务雷达图 · 六维财务指标对比工具</div>
 </div>
 <script>
   const canvas = document.getElementById('radar');
   const ctx = canvas.getContext('2d');
   
   const data = [
     { name:'格力电器', color:'#3b82f6', visible:true,
       metrics:[
         {label:'ROE', value:25.6, max:35},
         {label:'净利率', value:8.2, max:25},
         {label:'毛利率', value:27.8, max:90},
         {label:'周转率', value:55.3, max:100},
         {label:'杠杆', value:46.2, max:100},
         {label:'利润率', value:9.6, max:25}
       ]
     },
     { name:'永辉超市', color:'#f59e0b', visible:true,
       metrics:[
         {label:'ROE', value:9.8, max:35},
         {label:'净利率', value:2.5, max:25},
         {label:'毛利率', value:19.8, max:90},
         {label:'周转率', value:87.5, max:100},
         {label:'杠杆', value:93.9, max:100},
         {label:'利润率', value:3.0, max:25}
       ]
     },
     { name:'恒瑞医药', color:'#10b981', visible:true,
       metrics:[
         {label:'ROE', value:20.5, max:35},
         {label:'净利率', value:21.6, max:25},
         {label:'毛利率', value:87.1, max:90},
         {label:'周转率', value:29.0, max:100},
         {label:'杠杆', value:13.6, max:100},
         {label:'利润率', value:24.1, max:25}
       ]
     }
   ];
   
   const indices = [
     { label:'ROE', key:0, desc:'净资产收益率' },
     { label:'净利率', key:1, desc:'净利润/营收' },
     { label:'毛利率', key:2, desc:'毛利/营收' },
     { label:'周转率', key:3, desc:'营收/总资产(归一化)' },
     { label:'杠杆', key:4, desc:'总资产/权益(归一化)' },
     { label:'利润率', key:5, desc:'营业利润/营收' }
   ];
   
   function drawRadar() {
     const rect = canvas.parentElement.getBoundingClientRect();
     const size = Math.min(rect.width - 4, 600);
     const dpr = window.devicePixelRatio || 1;
     canvas.width = size * dpr;
     canvas.height = size * dpr;
     canvas.style.width = size + 'px';
     canvas.style.height = size + 'px';
     
     const w = canvas.width, h = canvas.height;
     const cx = w/2, cy = h/2;
     const radius = Math.min(w,h) * 0.35;
     const levels = 5;
     const angleStep = (Math.PI * 2) / 6;
     const startAngle = -Math.PI/2;
     
     ctx.clearRect(0,0,w,h);
     
     // Grid rings
     for (let l = 1; l <= levels; l++) {
       const r = (radius / levels) * l;
       ctx.beginPath();
       for (let i = 0; i <= 6; i++) {
         const a = startAngle + i * angleStep;
         const x = cx + r * Math.cos(a);
         const y = cy + r * Math.sin(a);
         i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
       }
       ctx.strokeStyle = 'rgba(148,163,184,0.1)';
       ctx.lineWidth = 1;
       ctx.stroke();
     }
     
     // Axis lines
     for (let i = 0; i < 6; i++) {
       const a = startAngle + i * angleStep;
       ctx.beginPath(); ctx.moveTo(cx,cy);
       ctx.lineTo(cx + radius * Math.cos(a), cy + radius * Math.sin(a));
       ctx.strokeStyle = 'rgba(148,163,184,0.15)';
       ctx.lineWidth = 1;
       ctx.stroke();
       
       // Labels
       const lx = cx + (radius + 25) * Math.cos(a);
       const ly = cy + (radius + 25) * Math.sin(a);
       ctx.fillStyle = '#94a3b8';
       ctx.font = '11px sans-serif';
       ctx.textAlign = 'center';
       ctx.textBaseline = 'middle';
       ctx.fillText(data[0].metrics[i].label, lx, ly);
     }
     
     // Data polygons
     data.forEach(company => {
       if (!company.visible) return;
       
       // Fill
       ctx.beginPath();
       company.metrics.forEach((m, i) => {
         const a = startAngle + i * angleStep;
         const pct = m.value / m.max;
         const x = cx + radius * pct * Math.cos(a);
         const y = cy + radius * pct * Math.sin(a);
         i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
       });
       ctx.closePath();
       ctx.fillStyle = company.color + '15';
       ctx.fill();
       
       // Stroke
       ctx.strokeStyle = company.color;
       ctx.lineWidth = 2;
       ctx.stroke();
       
       // Points
       company.metrics.forEach((m, i) => {
         const a = startAngle + i * angleStep;
         const pct = m.value / m.max;
         const x = cx + radius * pct * Math.cos(a);
         const y = cy + radius * pct * Math.sin(a);
         ctx.beginPath();
         ctx.arc(x, y, 4, 0, Math.PI*2);
         ctx.fillStyle = company.color;
         ctx.fill();
         ctx.strokeStyle = '#0f172a';
         ctx.lineWidth = 1.5;
         ctx.stroke();
       });
     });
     
     // Center labels
     ctx.fillStyle = '#334155';
     ctx.font = '10px sans-serif';
     ctx.textAlign = 'center';
     ctx.textBaseline = 'middle';
     for (let l = 1; l <= levels; l++) {
       const r = (radius / levels) * l;
       ctx.fillText((l * 20) + '%', cx + r * Math.cos(startAngle), cy + r * Math.sin(startAngle) + 8);
     }
   }
   
   function renderToggles() {
     const el = document.getElementById('toggles');
     let html = '';
     data.forEach((c, idx) => {
       html += `<div class="toggle-item" onclick="toggle(${idx})">
         <div class="dot" style="background:${c.color};opacity:${c.visible?1:0.3};"></div>
         <span class="name" style="opacity:${c.visible?1:0.5};">${c.name}</span>
         <span class="score" style="opacity:${c.visible?1:0.5};">${c.visible ? '●' : '○'}</span>
       </div>`;
     });
     el.innerHTML = html;
   }
   
   function renderScores() {
     const el = document.getElementById('scoreBoard');
     let html = '';
     data.forEach(c => {
       if (!c.visible) return;
       const score = c.metrics.reduce((s,m) => s + (m.value/m.max)*100/6, 0);
       const pct = Math.round(score);
       html += `<div class="legend-row">
         <div class="line" style="background:${c.color};"></div>
         <span>${c.name}</span>
         <span class="lv">${pct}/100</span>
       </div>`;
     });
     el.innerHTML = html || '<div style="color:#475569;font-size:12px;text-align:center;padding:10px;">请至少选择一家公司</div>';
   }
   
   function renderLegend() {
     const el = document.getElementById('legend');
     let html = '';
     indices.forEach(idx => {
       html += `<div class="legend-row"><span>${idx.label}</span><span style="color:#64748b;font-size:11px;">${idx.desc}</span></div>`;
     });
     el.innerHTML = html;
   }
   
   function toggle(idx) {
     data[idx].visible = !data[idx].visible;
     renderToggles();
     renderScores();
     drawRadar();
   }
   
   function resetAll() {
     data.forEach(c => c.visible = true);
     renderToggles();
     renderScores();
     drawRadar();
   }
   
   window.addEventListener('resize', drawRadar);
   renderToggles();
   renderScores();
   renderLegend();
   drawRadar();
 </script>
 </body>
 </html>
