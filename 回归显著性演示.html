<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回归与显著性 · 交互演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0b1120;color:#e2e8f0;padding:20px;}
.container{max-width:1000px;margin:0 auto;}
h1{font-size:20px;margin-bottom:4px;}
.sub{color:#64748b;font-size:13px;margin-bottom:16px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}}
.panel{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px;}
.panel h3{font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:10px;}
canvas{display:block;width:100%;aspect-ratio:4/3;background:#0b1120;border-radius:8px;}
.result-box{background:#0b1120;border-radius:8px;padding:12px;margin-top:10px;font-size:13px;line-height:1.8;}
.result-box .highlight{color:#e2e8f0;}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(148,163,184,.1);}
.stat-row .label{color:#64748b;font-size:12px;}
.stat-row .value{font-weight:600;font-size:14px;}
.star{color:#f59e0b;}
.ctrl-group{margin-bottom:8px;}
.ctrl-group label{font-size:12px;color:#94a3b8;display:block;margin-bottom:2px;}
.ctrl-group input[type=range]{width:100%;accent-color:#3b82f6;}
.ctrl-group .val{float:right;color:#3b82f6;font-weight:600;font-size:13px;}
.btn-group{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #1e293b;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;}
.btn:hover{border-color:#3b82f6;color:#e2e8f0;}
.btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.legend{font-size:11px;color:#64748b;margin-top:6px;display:flex;gap:12px;}
.legend span{display:flex;align-items:center;gap:4px;}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
</style>
</head>
<body>
<div class="container">
<h1>📈 回归与显著性 · 交互演示</h1>
<div class="sub">拖拽滑块看系数和 p 值怎么变——理解"跑数据"到底在跑什么</div>
<div class="two-col">
<div class="panel">
<h3>🎛️ 控制数据特征</h3>
<div class="ctrl-group">
<label><span>真实效应（斜率真值）</span><span class="val" id="trueEffVal">0.50</span></label>
<input type="range" id="trueEff" min="-1" max="1" step="0.05" value="0.5" oninput="updatePlot()">
</div>
<div class="ctrl-group">
<label><span>数据噪声（波动大小）</span><span class="val" id="noiseVal">0.30</span></label>
<input type="range" id="noise" min="0.05" max="1" step="0.05" value="0.3" oninput="updatePlot()">
</div>
<div class="ctrl-group">
<label><span>样本量（有多少个数据点）</span><span class="val" id="nVal">30</span></label>
<input type="range" id="n" min="10" max="200" step="5" value="30" oninput="updatePlot()">
</div>
<div class="btn-group">
<button class="btn active" onclick="setDemo('linear')" id="d1">线性关系</button>
<button class="btn" onclick="setDemo('weak')" id="d2">弱相关</button>
<button class="btn" onclick="setDemo('strong')" id="d3">强相关</button>
<button class="btn" onclick="setDemo('noise')" id="d4">高噪声</button>
</div>
<div class="legend">
<span><span class="dot" style="background:#3b82f6;"></span> 真实线</span>
<span><span class="dot" style="background:#ef4444;"></span> 回归线</span>
<span><span class="dot" style="background:#94a3b8;"></span> 数据点</span>
</div>
<div class="result-box" id="resultBox">
<div style="text-align:center;color:#475569;">调整上方参数观察变化</div>
</div>
</div>
<div class="panel">
<h3>📊 散点图与回归线</h3>
<canvas id="plotCanvas"></canvas>
<div class="result-box" id="interpretBox" style="margin-top:8px;">
拖拽左侧滑块，看回归线如何拟合数据点
</div>
</div>
</div>
</div>
<script>
const canvas=document.getElementById('plotCanvas');
const ctx=canvas.getContext('2d');
let data=[];

function resize(){
  const r=canvas.parentElement.getBoundingClientRect();
  const w=r.width-4;
  canvas.width=w*(window.devicePixelRatio||1);
  canvas.height=w*0.75*(window.devicePixelRatio||1);
  canvas.style.width=w+'px';
  canvas.style.height=(w*0.75)+'px';
}

function genData(trueEff,noiseLevel,n){
  data=[];
  for(let i=0;i<n;i++){
    const x=Math.random()*10;
    const y=trueEff*x+(Math.random()-0.5)*2*noiseLevel*10+3;
    data.push({x,y});
  }
}

function olsRegression(data){
  const n=data.length;
  let sx=0,sy=0,sxx=0,sxy=0;
  for(const d of data){sx+=d.x;sy+=d.y;sxx+=d.x*d.x;sxy+=d.x*d.y;}
  const mx=sx/n,my=sy/n;
  const beta1=(sxy-n*mx*my)/(sxx-n*mx*mx);
  const beta0=my-beta1*mx;
  let sse=0;
  for(const d of data){const pred=beta0+beta1*d.x;sse+=(d.y-pred)**2;}
  const mse=sse/(n-2);
  const seBeta1=Math.sqrt(mse/(sxx-n*mx*mx));
  const t=beta1/seBeta1;
  const df=n-2;
  const p=2*(1-tCdf(Math.abs(t),df));
  const r2=1-sse/(sse+beta1*beta1*(sxx-n*mx*mx));
  return{beta0,beta1,seBeta1,t,p,df,r2,n};
}

function tCdf(t,df){
  const x=df/(df+t*t);
  let p=1-0.5*betaInc(x,df/2,0.5);
  return p;
}

function betaInc(x,a,b){
  if(x===0||x===1)return 0;
  const logBeta=lgamma(a)+lgamma(b)-lgamma(a+b);
  return Math.exp(logBeta+Math.log(x)*a+Math.log(1-x)*b);
}

function lgamma(z){
  const g=7;
  const c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  if(z<0.5)return Math.PI/(Math.sin(Math.PI*z)*Math.exp(lgamma(1-z)));
  z-=1;
  let x=c[0];
  for(let i=1;i<g+2;i++)x+=c[i]/(z+i);
  const t=z+g+0.5;
  return 0.5*Math.log(2*Math.PI)+(z+0.5)*Math.log(t)-t+Math.log(x);
}

function stars(p){
  if(p<0.01)return '***';
  if(p<0.05)return '**';
  if(p<0.1)return '*';
  return '';
}

function draw(){
  const w=canvas.width,h=canvas.height,dp=window.devicePixelRatio||1;
  ctx.clearRect(0,0,w,h);
  const pad=50*dp;
  const pw=w-2*pad,ph=h-2*pad;
  const xMin=0,xMax=10,yMin=0,yMax=10;
  
  function sx(x){return pad+(x-xMin)/(xMax-xMin)*pw;}
  function sy(y){return pad+(1-(y-yMin)/(yMax-yMin))*ph;}
  
  ctx.strokeStyle='rgba(148,163,184,0.1)';
  ctx.lineWidth=dp;
  for(let i=0;i<=5;i++){
    const x=sx(i*2),y=sy(i*2);
    ctx.beginPath();ctx.moveTo(x,pad);ctx.lineTo(x,pad+ph);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+pw,y);ctx.stroke();
    ctx.fillStyle='rgba(148,163,184,0.3)';
    ctx.font=9*dp+'px sans-serif';ctx.textAlign='center';
    ctx.fillText((i*2).toFixed(0),x,pad+ph+12*dp);
    ctx.textAlign='right';ctx.fillText((i*2).toFixed(0),pad-6*dp,y+3*dp);
  }
  ctx.fillStyle='rgba(148,163,184,0.2)';ctx.font=9*dp+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('X →',pad+pw/2,pad+ph+28*dp);
  ctx.textAlign='center';ctx.fillText('Y',pad-30*dp,pad+ph/2);
  
  // Data points
  for(const d of data){
    ctx.beginPath();ctx.arc(sx(d.x),sy(d.y),3*dp,0,Math.PI*2);
    ctx.fillStyle='rgba(148,163,184,0.5)';ctx.fill();
  }
  
  const tEff=parseFloat(document.getElementById('trueEff').value);
  const noiseLvl=parseFloat(document.getElementById('noise').value);
  const nn=parseInt(document.getElementById('n').value);
  
  // True line
  ctx.beginPath();ctx.moveTo(sx(0),sy(3));ctx.lineTo(sx(10),sy(3+tEff*10));
  ctx.strokeStyle='rgba(59,130,246,0.4)';ctx.lineWidth=2*dp;ctx.setLineDash([6*dp,4*dp]);ctx.stroke();ctx.setLineDash([]);
  
  // Regression
  const res=olsRegression(data);
  ctx.beginPath();ctx.moveTo(sx(0),sy(res.beta0));ctx.lineTo(sx(10),sy(res.beta0+res.beta1*10));
  ctx.strokeStyle='#ef4444';ctx.lineWidth=2.5*dp;ctx.stroke();
  
  // Result text
  const pTxt=res.p<0.001?'<0.001':res.p.toFixed(4);
  const starStr=stars(res.p);
  const sigColor=res.p<0.05?'#10b981':res.p<0.1?'#f59e0b':'#ef4444';
  
  document.getElementById('resultBox').innerHTML=
    '<div style="font-size:13px;line-height:2;">'+
    '<div class="stat-row"><span class="label">回归系数（斜率）</span><span class="value" style="color:#ef4444;">'+res.beta1.toFixed(4)+'</span></div>'+
    '<div class="stat-row"><span class="label">标准误</span><span class="value">'+res.seBeta1.toFixed(4)+'</span></div>'+
    '<div class="stat-row"><span class="label">t 值</span><span class="value">'+res.t.toFixed(2)+'</span></div>'+
    '<div class="stat-row"><span class="label">p 值</span><span class="value" style="color:'+sigColor+';">'+pTxt+' <span class="star">'+starStr+'</span></span></div>'+
    '<div class="stat-row"><span class="label">R²（拟合优度）</span><span class="value">'+res.r2.toFixed(3)+'</span></div>'+
    '<div class="stat-row"><span class="label">样本量 (n)</span><span class="value">'+res.n+'</span></div>'+
    '</div>';
  
  // Interpret
  let interp='<strong>解读：</strong><br>';
  interp+='实际效应（蓝虚线）= '+tEff.toFixed(2)+'，';
  interp+='回归估计（红线）= '+res.beta1.toFixed(2)+'<br>';
  if(res.p<0.05){
    interp+='<span style="color:#10b981;">✅ p = '+pTxt+'，统计显著。可以认为X对Y有影响。</span>';
  }else if(res.p<0.1){
    interp+='<span style="color:#f59e0b;">⚠️ p = '+pTxt+'，边缘显著。需要更多数据才能下结论。</span>';
  }else{
    interp+='<span style="color:#ef4444;">❌ p = '+pTxt+'，不显著。无法排除"这只是巧合"。</span>';
  }
  interp+='<br><span style="color:#64748b;font-size:11px;">💡 增大样本量或降低噪声，p值会变小，星号会变多。</span>';
  document.getElementById('interpretBox').innerHTML=interp;
}

function updatePlot(){
  const trueEff=parseFloat(document.getElementById('trueEff').value);
  const noiseLvl=parseFloat(document.getElementById('noise').value);
  const nn=parseInt(document.getElementById('n').value);
  document.getElementById('trueEffVal').textContent=trueEff.toFixed(2);
  document.getElementById('noiseVal').textContent=noiseLvl.toFixed(2);
  document.getElementById('nVal').textContent=nn;
  genData(trueEff,noiseLvl,nn);
  draw();
}

function setDemo(type){
  document.querySelectorAll('.btn-group .btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('d1').classList.add('active');
  const presets={
    linear:{eff:0.5,noise:0.3,n:30,active:'d1'},
    weak:{eff:0.1,noise:0.5,n:25,active:'d2'},
    strong:{eff:0.9,noise:0.2,n:80,active:'d3'},
    noise:{eff:0.5,noise:0.9,n:30,active:'d4'}
  };
  const p=presets[type];
  document.getElementById(p.active).classList.add('active');
  document.getElementById('trueEff').value=p.eff;
  document.getElementById('noise').value=p.noise;
  document.getElementById('n').value=p.n;
  updatePlot();
}

resize();updatePlot();
window.addEventListener('resize',()=>{resize();draw();});
</script>
</body>
</html>
