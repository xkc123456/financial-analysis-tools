 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width,initial-scale=1.0">
 <title>微贷智能审批沙盘 - FinTech Demo</title>
 <style>
   * { margin: 0; padding: 0; box-sizing: border-box; }
   body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; min-height: 100vh; }
   .container { max-width: 1200px; margin: 0 auto; }
   header { margin-bottom: 24px; }
   header h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
   header h1 small { font-size: 12px; font-weight: 400; background: #334155; padding: 2px 10px; border-radius: 10px; color: #94a3b8; }
   header p { color: #64748b; font-size: 14px; margin-top: 4px; }
   .grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
   @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
   .panel { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
   .panel-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; }
   .form-group { margin-bottom: 14px; }
   .form-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; color: #cbd5e1; margin-bottom: 4px; }
   .form-group label span { color: #64748b; font-weight: 400; }
   .form-group input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; background: #334155; border-radius: 3px; outline: none; }
   .form-group input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
   .form-group input[type="number"], .form-group select { width: 100%; padding: 8px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 13px; }
   .form-group .val { font-size: 18px; font-weight: 700; color: #3b82f6; }
   .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
   .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; width: 100%; }
   .btn-primary { background: #3b82f6; color: #fff; }
   .btn-primary:hover { background: #2563eb; }
   .btn-success { background: #059669; color: #fff; }
   .btn-success:hover { background: #047857; }
   .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
   .decision { font-size: 28px; font-weight: 800; }
   .decision.approved { color: #10b981; }
   .decision.rejected { color: #ef4444; }
   .decision.review { color: #f59e0b; }
   .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
   .stat-card { background: #0f172a; border-radius: 8px; padding: 12px; text-align: center; }
   .stat-card .num { font-size: 22px; font-weight: 700; }
   .stat-card .lbl { font-size: 11px; color: #64748b; margin-top: 2px; }
   .breakdown-section { margin-bottom: 12px; }
   .breakdown-section h3 { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
   .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
   .bar-row .bar-label { font-size: 12px; color: #94a3b8; width: 70px; flex-shrink: 0; }
   .bar-row .bar-track { flex: 1; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; position: relative; }
   .bar-row .bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
   .bar-row .bar-val { font-size: 11px; color: #64748b; width: 40px; text-align: right; }
   .factor-list { margin-top: 12px; }
   .factor-item { padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
   .factor-item.positive { background: rgba(16,185,129,.1); border-left: 3px solid #10b981; }
   .factor-item.negative { background: rgba(239,68,68,.1); border-left: 3px solid #ef4444; }
   .factor-item.neutral { background: rgba(148,163,184,.1); border-left: 3px solid #94a3b8; }
   .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
   .tag.green { background: rgba(16,185,129,.15); color: #10b981; }
   .tag.red { background: rgba(239,68,68,.15); color: #ef4444; }
   .tag.yellow { background: rgba(245,158,11,.15); color: #f59e0b; }
   .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #475569; }
   .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
   .empty-state p { font-size: 14px; }
   .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #475569; }
 </style>
 </head>
 <body>
 <div class="container">
   <header>
     <h1>🏦 微贷智能审批沙盘 <small>FinTech Credit Engine Demo</small></h1>
     <p>模拟金融科技公司的智能信贷审批系统——输入企业信息，系统自动评估风险并给出贷款方案</p>
   </header>
   <div class="grid">
     <div class="panel">
       <div class="panel-title">📋 企业信息录入</div>
       <div class="form-group">
         <label>年营收 <span>万元</span></label>
         <div style="display:flex;align-items:center;gap:10px;">
           <input type="range" id="revenue" min="10" max="10000" value="500" step="10" oninput="document.getElementById('revenueVal').textContent=this.value;updateLive()">
           <span class="val" id="revenueVal" style="font-size:16px;min-width:60px;">500</span>
         </div>
       </div>
       <div class="form-row">
         <div class="form-group">
           <label>经营年限</label>
           <input type="range" id="years" min="1" max="30" value="3" oninput="document.getElementById('yearsVal').textContent=this.value+'年';updateLive()">
           <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;"><span>1年</span><span id="yearsVal">3年</span><span>30年</span></div>
         </div>
         <div class="form-group">
           <label>企业信用分</label>
           <input type="range" id="credit" min="300" max="900" value="650" step="10" oninput="document.getElementById('creditVal').textContent=this.value;updateLive()">
           <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;"><span>300</span><span id="creditVal">650</span><span>900</span></div>
         </div>
       </div>
       <div class="form-row">
         <div class="form-group">
           <label>所属行业</label>
           <select id="industry" onchange="updateLive()">
             <option value="tech">科技/互联网</option>
             <option value="manufacturing">制造业</option>
             <option value="retail" selected>零售/贸易</option>
             <option value="catering">餐饮服务</option>
             <option value="agriculture">农业</option>
             <option value="education">教育</option>
           </select>
         </div>
         <div class="form-group">
           <label>流水稳定性</label>
           <select id="stability" onchange="updateLive()">
             <option value="stable">稳定增长</option>
             <option value="medium" selected>中等波动</option>
             <option value="volatile">波动较大</option>
           </select>
         </div>
       </div>
       <div class="form-row">
         <div class="form-group">
           <label>历史贷款次数</label>
           <input type="range" id="loanCount" min="0" max="20" value="1" oninput="document.getElementById('loanCountVal').textContent=this.value+'次';updateLive()">
           <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;"><span>0</span><span id="loanCountVal">1次</span><span>20+</span></div>
         </div>
         <div class="form-group">
           <label>是否有抵押资产</label>
           <select id="collateral" onchange="updateLive()">
             <option value="yes">有</option>
             <option value="no" selected>无</option>
           </select>
         </div>
       </div>
       <div style="margin-top:16px;">
         <button class="btn btn-primary" onclick="runApproval()">🚀 提交审批</button>
       </div>
     </div>
     <div class="panel" id="resultPanel">
       <div class="panel-title">📊 审批结果</div>
       <div id="resultContent">
         <div class="empty-state">
           <div class="icon">📃</div>
           <p>填写左侧信息后点击"提交审批"<br>系统将模拟金融科技公司的智能决策流程</p>
         </div>
       </div>
     </div>
   </div>
   <div class="footer">微贷智能审批沙盘 · 模拟风控逻辑教学工具 · 非真实信贷产品</div>
 </div>
 <script>
 function getSel(id) { return document.getElementById(id).value; }
 function getNum(id) { return parseFloat(document.getElementById(id).value) || 0; }
 
 function calcScore() {
   const rev = getNum('revenue');
   const yrs = getNum('years');
   const cred = getNum('credit');
   const ind = getSel('industry');
   const stab = getSel('stability');
   const loans = getNum('loanCount');
   const coll = getSel('collateral');
   
   let details = [];
   let score = 0;
   
   // 1. Revenue scoring
   if (rev >= 5000) { score += 30; details.push({factor:'年营收5000万以上', points:30, type:'positive'}); }
   else if (rev >= 2000) { score += 25; details.push({factor:'年营收2000-5000万', points:25, type:'positive'}); }
   else if (rev >= 500) { score += 18; details.push({factor:'年营收500-2000万', points:18, type:'positive'}); }
   else if (rev >= 100) { score += 10; details.push({factor:'年营收100-500万', points:10, type:'neutral'}); }
   else { score += 3; details.push({factor:'年营收不足100万', points:3, type:'negative'}); }
   
   // 2. Years in business
   if (yrs >= 10) { score += 25; details.push({factor:`经营${yrs}年，根基稳固`, points:25, type:'positive'}); }
   else if (yrs >= 5) { score += 18; details.push({factor:`经营${yrs}年，稳定性良好`, points:18, type:'positive'}); }
   else if (yrs >= 3) { score += 12; details.push({factor:`经营${yrs}年，已过生存期`, points:12, type:'neutral'}); }
   else { score += 5; details.push({factor:`经营仅${yrs}年，初创期`, points:5, type:'negative'}); }
   
   // 3. Credit score
   const creditScore = (cred - 300) / 600 * 35;
   score += creditScore;
   if (cred >= 750) details.push({factor:'企业信用分高(750+)', points:creditScore.toFixed(1), type:'positive'});
   else if (cred >= 600) details.push({factor:'信用分良好', points:creditScore.toFixed(1), type:'neutral'});
   else details.push({factor:'信用分偏低', points:creditScore.toFixed(1), type:'negative'});
   
   // 4. Industry
   const indFactors = { tech:12, manufacturing:8, retail:4, catering:-3, agriculture:-5, education:6 };
   const indPts = indFactors[ind] || 0;
   score += indPts;
   const indNames = { tech:'科技/互联网', manufacturing:'制造业', retail:'零售/贸易', catering:'餐饮服务', agriculture:'农业', education:'教育' };
   if (indPts >= 8) details.push({factor:`行业优势：${indNames[ind]}`, points:indPts, type:'positive'});
   else if (indPts >= 0) details.push({factor:`行业中性：${indNames[ind]}`, points:indPts, type:'neutral'});
   else details.push({factor:`行业风险：${indNames[ind]}`, points:indPts, type:'negative'});
   
   // 5. Stability
   if (stab === 'stable') { score += 15; details.push({factor:'流水稳定增长', points:15, type:'positive'}); }
   else if (stab === 'medium') { score += 5; details.push({factor:'流水中等波动', points:5, type:'neutral'}); }
   else { score -= 10; details.push({factor:'流水波动较大', points:-10, type:'negative'}); }
   
   // 6. Loan history
   if (loans >= 3) { score += 8; details.push({factor:`历史贷款${loans}次，有信用记录`, points:8, type:'positive'}); }
   else if (loans >= 1) { score += 4; details.push({factor:`历史贷款${loans}次`, points:4, type:'neutral'}); }
   else { score += 0; details.push({factor:'无历史贷款记录(白户)', points:0, type:'negative'}); }
   
   // 7. Collateral
   if (coll === 'yes') { score += 15; details.push({factor:'有抵押资产', points:15, type:'positive'}); }
   else { details.push({factor:'无抵押资产（信用贷）', points:0, type:'neutral'}); }
   
   return { score: Math.min(100, Math.max(0, score)), details };
 }
 
 function runApproval() {
   const rev = getNum('revenue');
   const result = calcScore();
   const { score, details } = result;
   
   // Decision
   let decision, decisionClass, decisionText;
   let maxLoan, rate, termMonths;
   
   if (score >= 70) {
     decision = 'approved'; decisionClass = 'approved'; decisionText = '✅ 审批通过';
     maxLoan = Math.round(rev * 0.3 * (score / 100));
     rate = (5 + (100 - score) * 0.12).toFixed(1);
     termMonths = 36;
   } else if (score >= 45) {
     decision = 'review'; decisionClass = 'review'; decisionText = '⏳ 需人工审核';
     maxLoan = Math.round(rev * 0.15 * (score / 100));
     rate = (8 + (100 - score) * 0.15).toFixed(1);
     termMonths = 24;
   } else {
     decision = 'rejected'; decisionClass = 'rejected'; decisionText = '❌ 审批拒绝';
     maxLoan = 0; rate = '-'; termMonths = 0;
   }
   
   // Risk level
   let riskLvl, riskTag;
   if (score >= 75) { riskLvl = '低风险'; riskTag = 'green'; }
   else if (score >= 50) { riskLvl = '中等风险'; riskTag = 'yellow'; }
   else { riskLvl = '高风险'; riskTag = 'red'; }
   
   // Rate display
   const rateDisplay = rate !== '-' ? rate + '%' : '—';
   const maxLoanDisplay = maxLoan > 0 ? maxLoan.toLocaleString() + '万元' : '—';
   
   // Breakdown scores
   const revBucket = getNum('revenue');
   const yrsBucket = getNum('years');
   const credBucket = getNum('credit');
   const revScore = revBucket >= 5000 ? 30 : revBucket >= 2000 ? 25 : revBucket >= 500 ? 18 : revBucket >= 100 ? 10 : 3;
   const yrsScore = yrsBucket >= 10 ? 25 : yrsBucket >= 5 ? 18 : yrsBucket >= 3 ? 12 : 5;
   const credScore = ((credBucket - 300) / 600 * 35);
   const maxCredScore = 35;
   const stabScore = getSel('stability') === 'stable' ? 15 : getSel('stability') === 'medium' ? 5 : -10;
   const maxStabScore = 15;
   
   let html = '';
   html += `<div class="result-header"><div><div class="decision ${decisionClass}">${decisionText}</div><div style="font-size:13px;color:#64748b;margin-top:2px;">综合评分：${score.toFixed(1)}/100 · <span class="tag ${riskTag}">${riskLvl}</span></div></div></div>`;
   html += `<div class="stat-grid">
     <div class="stat-card"><div class="num" style="color:#3b82f6;">${maxLoanDisplay}</div><div class="lbl">建议额度</div></div>
     <div class="stat-card"><div class="num" style="color:#f59e0b;">${rateDisplay}</div><div class="lbl">年利率</div></div>
     <div class="stat-card"><div class="num" style="color:#10b981;">${termMonths > 0 ? termMonths+'个月' : '—'}</div><div class="lbl">最长期限</div></div>
   </div>`;
   
   // Bar chart: breakdown
   html += `<div class="breakdown-section"><h3>📈 各维度评分</h3>`;
   const bars = [
     { label: '营收能力', val: revScore, max: 30, color: '#3b82f6' },
     { label: '经营稳定性', val: yrsScore, max: 25, color: '#10b981' },
     { label: '信用记录', val: credScore, max: 35, color: '#8b5cf6' },
     { label: '流水稳定性', val: stabScore > 0 ? stabScore : 0, max: maxStabScore, color: stabScore > 0 ? '#f59e0b' : '#ef4444', raw: stabScore },
   ];
   bars.forEach(b => {
     const pct = Math.min(100, (b.val / b.max) * 100);
     html += `<div class="bar-row">
       <span class="bar-label">${b.label}</span>
       <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${b.color};"></div></div>
       <span class="bar-val">${b.raw !== undefined ? (b.raw > 0 ? '+' : '') + b.raw : b.val.toFixed(1)}</span>
     </div>`;
   });
   html += `</div>`;
   
   // Factors
   html += `<div class="breakdown-section"><h3>🔍 决策因子分析</h3><div class="factor-list">`;
   details.forEach(d => {
     html += `<div class="factor-item ${d.type}"><span>${d.type === 'positive' ? '✅' : d.type === 'negative' ? '⚠️' : 'ℹ️'}</span><span>${d.factor}</span><span style="margin-left:auto;font-weight:600;font-size:13px;">${typeof d.points === 'string' ? d.points : (d.points > 0 ? '+'+d.points : d.points)}</span></div>`;
   });
   html += `</div></div>`;
   
   // Risk explanation
   html += `<div class="breakdown-section"><h3>📝 审批说明</h3><div style="font-size:13px;color:#94a3b8;line-height:1.6;background:#0f172a;padding:12px;border-radius:8px;">`;
   if (decision === 'approved') {
     html += `该企业综合评分优秀（${score.toFixed(1)}/100），各项指标表现良好。系统建议授信额度 ${maxLoanDisplay}。最终放款需结合线下尽调确认。`;
   } else if (decision === 'review') {
     html += `该企业综合评分 ${score.toFixed(1)}/100，系统判定需人工介入。建议风控团队重点关注以下维度：营收质量、流水稳定性和行业风险。如补充抵押物或担保人，可提升审批通过概率。`;
   } else {
     html += `该企业综合评分 ${score.toFixed(1)}/100，系统判定风险过高。主要风险点包括：营收规模偏小、信用记录不足或经营年限较短。建议先通过小微企业扶持计划积累信用记录后再申请。`;
   }
   html += `</div></div>`;
   
   document.getElementById('resultContent').innerHTML = html;
 }
 
 function updateLive() { /* only update when user clicks submit */ }
 
 // Run on load with defaults
 window.onload = function() { runApproval(); };
 </script>
 </body>
 </html>
